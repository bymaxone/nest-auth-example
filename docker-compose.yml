name: nest-auth-example

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-example_app}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-example_app}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - local-dev

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '/usr/local/etc/redis/redis.conf']
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - local-dev

  mailpit:
    image: axllent/mailpit@sha256:757f22b56c1da03570afdb3d259effe5091018008a81bbedc8158cee7e16fdbc
    restart: unless-stopped
    ports:
      - '127.0.0.1:1025:1025'
      - '127.0.0.1:8025:8025'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8025/api/v1/info || exit 1']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - local-dev

networks:
  local-dev:
    driver: bridge

volumes:
  pg-data:
  redis-data:
