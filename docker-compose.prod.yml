name: nest-auth-example-prod

# Production-topology compose file for local smoke testing.
# Mirrors the four-service topology described in docs/DEPLOYMENT.md.
#
# Usage:
#   cp .env.prod.example .env.prod
#   # fill in real secrets in .env.prod
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --wait
#
# Images are published to GHCR by .github/workflows/release.yml on every v* tag.
# Pull the latest release before running: docker compose -f docker-compose.prod.yml pull
#
# No Mailpit in this file — production uses `EMAIL_PROVIDER=resend`.

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-example_app_prod}
    volumes:
      - pg-prod-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB:-example_app_prod}
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - prod

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Persist to disk (appendonly) so session data survives a Redis restart.
    # requirepass enforces authentication; any container on the prod network
    # must supply REDIS_PASSWORD to connect.  This protects JWT revocation
    # state, brute-force counters, and session data from unauthenticated access.
    command:
      - redis-server
      - --appendonly
      - 'yes'
      - --requirepass
      - '${REDIS_PASSWORD}'
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - volatile-lru
    volumes:
      - redis-prod-data:/data
    healthcheck:
      # redis-cli ping requires -a when requirepass is set.
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - prod

  api:
    image: ghcr.io/bymaxone/nest-auth-example-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY}
      API_PORT: ${API_PORT:-4000}
      WEB_ORIGIN: ${WEB_ORIGIN}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-resend}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_FROM: ${SMTP_FROM}
      # Optional — leave unset to disable Google OAuth
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
      OAUTH_GOOGLE_CALLBACK_URL: ${OAUTH_GOOGLE_CALLBACK_URL:-}
      # Optional — leave unset for no tenant-level MFA enforcement
      MFA_REQUIRED_TENANT_SLUGS: ${MFA_REQUIRED_TENANT_SLUGS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    networks:
      - prod

  web:
    image: ghcr.io/bymaxone/nest-auth-example-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      # Expose the web app on the host.  Put a TLS-terminating reverse proxy
      # in front of this port in a real production setup.
      - '${WEB_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      # Internal URL from web container to API container (Docker network hostname).
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api:4000}
      # Must match the API's JWT_SECRET exactly — used by the Next.js auth proxy
      # to verify access-token cookies without a round-trip to the API.
      AUTH_JWT_SECRET_FOR_PROXY: ${AUTH_JWT_SECRET_FOR_PROXY}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000 || exit 1']
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    networks:
      - prod

networks:
  prod:
    driver: bridge

volumes:
  pg-prod-data:
  redis-prod-data:
