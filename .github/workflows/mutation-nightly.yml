# Mutation testing — weekly full run on main.
#
# Runs a complete (non-incremental) Stryker on both workspaces every Monday
# at 03:00 UTC to catch drift the per-PR incremental cache might mask
# (cross-file refactors, stale baseline corruption, etc.). Also runnable on
# demand via `workflow_dispatch`.
#
# Failure here is signal — open an issue tagged `mutation-drift` and run
# `pnpm mutation:api` / `pnpm mutation:web` locally to investigate before
# the next PR merges. The PR gate in `mutation.yml` remains the primary
# enforcement; this workflow is the safety net.

name: Mutation Testing (Nightly Full)

on:
  schedule:
    - cron: '0 3 * * 1' # Mondays at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-api:
    name: Mutation full — apps/api
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/api
        run: pnpm prisma:generate
        # Prisma 7 resolves `env('DATABASE_URL')` in prisma.config.ts at CLI
        # load time, so `prisma generate` fails without it even though it
        # never connects to the database. A placeholder is enough — this
        # mirrors the same step in ci.yml.
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_placeholder

      # `--force` makes Stryker run all mutants even if an incremental file
      # exists, giving a true cold baseline without relying on any cache.
      - name: Run full mutation testing (api)
        working-directory: apps/api
        run: pnpm exec stryker run --force

      - name: Upload full mutation HTML report (api)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report-api-full
          path: apps/api/reports/mutation/
          retention-days: 90

  full-web:
    name: Mutation full — apps/web
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run full mutation testing (web)
        working-directory: apps/web
        run: pnpm exec stryker run --force

      - name: Upload full mutation HTML report (web)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report-web-full
          path: apps/web/reports/mutation/
          retention-days: 90
