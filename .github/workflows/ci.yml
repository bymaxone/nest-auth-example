# CI — thin caller of the org-wide reusable pipeline (bymaxone/.github).
#
# The generic pipeline (lint, typecheck, format, unit+coverage, API e2e,
# web-build, export audit, mutation) lives in bymaxone/.github so every repo
# shares one definition. The Playwright web smoke runs in the official Playwright
# container against Postgres/Redis/Mailpit service containers, so it stays here.
# Mutation runs only on a push to main / manual dispatch, never on PRs or a schedule.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    uses: bymaxone/.github/.github/workflows/node-ci.yml@v1
    with:
      # @bymax-one/nest-auth is consumed from the registry, so no sibling build.
      library-repo: ''
      has-web: true
      run-export-audit: true
      run-mutation: true
      run-e2e-web: false # containerized Playwright job kept below
      e2e-api-command: pnpm --filter @nest-auth-example/api run test:e2e
      # Placeholder so prisma.config.ts (which reads DATABASE_URL at load time in
      # lint/typecheck/unit/e2e-api) resolves; the live web e2e uses the service DB.
      database-url: postgresql://postgres:postgres@localhost:5432/ci_placeholder
      # pnpm v10 ignores the prisma build script, so generate the client explicitly.
      post-install: pnpm --filter @nest-auth-example/api run prisma:generate
      mutation-source-globs: '^(apps/api/src/|apps/web/lib/|apps/web/components/)'

  # App-specific web smoke: runs in the official Playwright container with Postgres,
  # Redis, and Mailpit service containers, migrates + seeds, builds, then runs the
  # journeys. Service containers can't be parameterized in a reusable, so it lives here.
  e2e-web:
    name: E2E — Web (Playwright)
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user root
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: example_app_test
        options: >-
          --health-cmd "pg_isready -U postgres -d example_app_test"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
      mailpit:
        image: axllent/mailpit@sha256:757f22b56c1da03570afdb3d259effe5091018008a81bbedc8158cee7e16fdbc
    env:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/example_app_test?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      AUTH_JWT_SECRET_FOR_PROXY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      MFA_ENCRYPTION_KEY: QUJDREVGR0hJSktMTU5PUFFSU1RVVldYWVphYmNkZWY=
      EMAIL_PROVIDER: mailpit
      SMTP_HOST: mailpit
      SMTP_PORT: '1025'
      SMTP_FROM: no-reply@ci.test
      API_PORT: '4000'
      WEB_ORIGIN: http://localhost:3000
      INTERNAL_API_URL: http://localhost:4000
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
      NEXT_PUBLIC_WS_URL: ws://localhost:3000
      NEXT_PUBLIC_OAUTH_GOOGLE_ENABLED: 'true'
      MAILPIT_URL: http://mailpit:8025
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @nest-auth-example/api run prisma:generate

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('apps/web/**.[jt]s', 'apps/web/**.[jt]sx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: Build API
        run: pnpm --filter @nest-auth-example/api run build

      - name: Build web
        run: pnpm --filter @nest-auth-example/web run build

      - name: Run Playwright tests
        run: pnpm --filter @nest-auth-example/web run test:e2e

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 7

  security:
    if: github.event_name == 'pull_request' && github.event.repository.visibility == 'public'
    uses: bymaxone/.github/.github/workflows/security.yml@v1
    with:
      fail-on-severity: high
