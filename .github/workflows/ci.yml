# CI pipeline — runs on every push and pull_request targeting main / next.
#
# Job names are contractual: branch-protection rules and the export-usage-check
# script reference them by name.  Do not rename without updating those references.
#
# Job order
#   install ──┬── lint
#             ├── typecheck
#             ├── unit
#             ├── e2e-api ── e2e-web ──┐
#             └── export-usage-check   │
#                                      └── coverage-report

name: CI

on:
  push:
    branches:
      - main
      - next
  pull_request:
    branches:
      - main
      - next

# Cancel in-progress runs for the same ref so only the latest commit runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── install ────────────────────────────────────────────────────────────────
  # Resolves and caches the pnpm store so every subsequent job avoids
  # re-downloading packages.  Each job still runs `pnpm install` to populate
  # its own node_modules from the cached store (GitHub runners don't share FS).
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

  # ── lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # prisma.config.ts calls env('DATABASE_URL') at load time; a syntactically
      # valid placeholder satisfies the check — prisma generate never opens a connection.
      - name: Generate Prisma client
        run: pnpm --filter @nest-auth-example/api run prisma:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_placeholder

      - run: pnpm lint

  # ── typecheck ──────────────────────────────────────────────────────────────
  typecheck:
    name: Type-check
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # prisma.config.ts calls env('DATABASE_URL') at load time; seed.ts imports
      # @prisma/client types that only exist after code generation.
      - name: Generate Prisma client
        run: pnpm --filter @nest-auth-example/api run prisma:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_placeholder

      - run: pnpm typecheck

  # ── unit ───────────────────────────────────────────────────────────────────
  # Runs the full unit + integration test suites with coverage.
  # Coverage reports are uploaded as artifacts for the coverage-report job.
  unit:
    name: Unit tests
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The API unit tests import @prisma/client types; generate first.
      - name: Generate Prisma client
        run: pnpm --filter @nest-auth-example/api run prisma:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_placeholder

      - name: Run unit tests with coverage
        run: pnpm test:cov

      - name: Upload API coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-api
          path: apps/api/coverage/
          retention-days: 7

      - name: Upload web coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-web
          path: apps/web/coverage/
          retention-days: 7

  # ── e2e-api ────────────────────────────────────────────────────────────────
  # Boots the CI test stack (postgres:18 on :55432, redis:7 on :56379,
  # mailpit on :51025/:58025) via docker-compose.test.yml, then runs the
  # NestJS supertest suite.  The pretest:e2e hook in apps/api/package.json
  # runs `prisma migrate deploy` automatically before the suite starts.
  e2e-api:
    name: E2E — API
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Generate must run before docker compose; placeholder URL satisfies
      # prisma.config.ts without requiring a live database connection.
      - name: Generate Prisma client
        run: pnpm --filter @nest-auth-example/api run prisma:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_placeholder

      - name: Start test infrastructure
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Run API e2e tests
        run: pnpm --filter @nest-auth-example/api run test:e2e

      - name: Upload e2e API test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-api-results
          path: apps/api/test-results/
          retention-days: 7

      - name: Stop test infrastructure
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  # ── e2e-web ────────────────────────────────────────────────────────────────
  # Playwright end-to-end suite using the official Playwright container image.
  # mcr.microsoft.com/playwright has Chromium pre-installed — no browser
  # download step needed, which eliminates the APT lock and slow-network issues
  # that caused playwright install --with-deps to hang on ubuntu-latest runners.
  #
  # Services (postgres, redis, mailpit) are defined as GitHub Actions service
  # containers, reachable inside the job container by service hostname.
  e2e-web:
    name: E2E — Web (Playwright)
    needs: e2e-api
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user root
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: example_app_test
        options: >-
          --health-cmd "pg_isready -U postgres -d example_app_test"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
      mailpit:
        image: axllent/mailpit@sha256:757f22b56c1da03570afdb3d259effe5091018008a81bbedc8158cee7e16fdbc
    env:
      # Inside a container job services are reachable by service name, not
      # localhost — postgres:5432, redis:6379, mailpit:1025.
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/example_app_test?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      AUTH_JWT_SECRET_FOR_PROXY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      MFA_ENCRYPTION_KEY: QUJDREVGR0hJSktMTU5PUFFSU1RVVldYWVphYmNkZWY=
      EMAIL_PROVIDER: mailpit
      SMTP_HOST: mailpit
      SMTP_PORT: '1025'
      SMTP_FROM: no-reply@ci.test
      API_PORT: '4000'
      WEB_ORIGIN: http://localhost:3000
      INTERNAL_API_URL: http://localhost:4000
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
      NEXT_PUBLIC_WS_URL: ws://localhost:3000
      NEXT_PUBLIC_OAUTH_GOOGLE_ENABLED: 'true'
      # Mailpit HTTP API — inside container job use service hostname, not localhost.
      MAILPIT_URL: http://mailpit:8025
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @nest-auth-example/api run prisma:generate

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('apps/web/**.[jt]s', 'apps/web/**.[jt]sx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: Build API
        run: pnpm --filter @nest-auth-example/api run build

      - name: Build web
        run: pnpm --filter @nest-auth-example/web run build

      - name: Run Playwright tests
        run: pnpm --filter @nest-auth-example/web run test:e2e

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 7

  # ── coverage-report ────────────────────────────────────────────────────────
  # Aggregates coverage artefacts from the unit job and uploads a combined
  # report.  Fails only if upstream jobs failed (via needs).
  coverage-report:
    name: Coverage report
    needs: [unit, e2e-api, e2e-web]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download API coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit-api
          path: coverage/api
        continue-on-error: true

      - name: Download web coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit-web
          path: coverage/web
        continue-on-error: true

      - name: Upload combined coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-combined
          path: coverage/
          retention-days: 30

  # ── export-usage-check ─────────────────────────────────────────────────────
  # Audits that every public export from @bymax-one/nest-auth is referenced
  # at least once in the apps/ tree.  Full implementation ships in Phase 20;
  # the current script is a stub that always exits 0.
  export-usage-check:
    name: Export usage check
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: node scripts/audit-library-exports.mjs
