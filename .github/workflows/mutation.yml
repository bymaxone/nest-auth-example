# Mutation testing — PR gate.
#
# Runs Stryker on the workspace(s) touched by the pull request, using the
# incremental cache so most PRs finish in <2 minutes. `stryker.config.json`
# sets `thresholds.break = 100` in both workspaces, so any surviving mutant
# fails the job and blocks the merge.
#
# A weekly full (non-incremental) run lives in `mutation-nightly.yml` and
# catches drift the incremental cache might mask.
#
# See docs/stryker/IMPLEMENTATION_PLAN.md and docs/stryker/HISTORY.md.

name: Mutation Testing (PR)

on:
  pull_request:
    paths:
      # Anything that can change behaviour or its test surface.
      - 'apps/api/src/**'
      - 'apps/api/test/**'
      - 'apps/api/jest.stryker.config.ts'
      - 'apps/api/stryker.config.json'
      - 'apps/api/package.json'
      - 'apps/api/tsconfig*.json'
      - 'apps/api/prisma/schema.prisma'
      - 'apps/web/app/**'
      - 'apps/web/lib/**'
      - 'apps/web/components/**'
      - 'apps/web/proxy.ts'
      - 'apps/web/stryker.config.json'
      - 'apps/web/package.json'
      - 'apps/web/tsconfig*.json'
      - 'apps/web/vitest.config.ts'
      - 'pnpm-lock.yaml'
      - '.github/workflows/mutation.yml'

concurrency:
  group: mutation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect which workspace(s) actually changed so we only run mutation
  # on the ones whose code or tests were touched.
  detect:
    name: Detect changed workspaces
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/src/**'
              - 'apps/api/test/**'
              - 'apps/api/jest.stryker.config.ts'
              - 'apps/api/stryker.config.json'
              - 'apps/api/package.json'
              - 'apps/api/tsconfig*.json'
              - 'apps/api/prisma/schema.prisma'
              - 'pnpm-lock.yaml'
              - '.github/workflows/mutation.yml'
            web:
              - 'apps/web/app/**'
              - 'apps/web/lib/**'
              - 'apps/web/components/**'
              - 'apps/web/proxy.ts'
              - 'apps/web/stryker.config.json'
              - 'apps/web/package.json'
              - 'apps/web/tsconfig*.json'
              - 'apps/web/vitest.config.ts'
              - 'pnpm-lock.yaml'
              - '.github/workflows/mutation.yml'

  mutation-api:
    name: Mutation — apps/api
    needs: detect
    if: needs.detect.outputs.api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        # Full history so Stryker's incremental diff can compare against
        # the base branch on the first PR run.
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/api
        run: pnpm prisma:generate
        # Prisma 7 resolves `env('DATABASE_URL')` in prisma.config.ts at CLI
        # load time, so `prisma generate` fails without it even though it
        # never connects to the database. A placeholder is enough — this
        # mirrors the same step in ci.yml.
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_placeholder

      # Restore the incremental cache. Try the PR branch's own cache first,
      # then fall back to main's so the first run on a new PR still benefits
      # from prior mutation knowledge.
      - name: Restore Stryker incremental cache (api)
        uses: actions/cache@v4
        with:
          path: apps/api/reports/stryker-incremental.json
          key: stryker-incremental-api-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            stryker-incremental-api-${{ github.ref }}-
            stryker-incremental-api-refs/heads/main-

      - name: Run mutation testing (api)
        run: pnpm mutation:api

      - name: Upload mutation HTML report (api)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report-api
          path: apps/api/reports/mutation/
          retention-days: 30

  mutation-web:
    name: Mutation — apps/web
    needs: detect
    if: needs.detect.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Restore Stryker incremental cache (web)
        uses: actions/cache@v4
        with:
          path: apps/web/reports/stryker-incremental.json
          key: stryker-incremental-web-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            stryker-incremental-web-${{ github.ref }}-
            stryker-incremental-web-refs/heads/main-

      - name: Run mutation testing (web)
        run: pnpm mutation:web

      - name: Upload mutation HTML report (web)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report-web
          path: apps/web/reports/mutation/
          retention-days: 30
