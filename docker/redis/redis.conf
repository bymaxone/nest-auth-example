# Dev config: AOF for durability, no RDB snapshots, volatile-LRU eviction.
# WARNING: No requirepass or bind directive -- DO NOT use this file in production.
# Production config must add: requirepass, bind 127.0.0.1,
# and rename or disable dangerous commands (FLUSHALL, CONFIG, DEBUG).

# Container network isolation is the primary access control for dev.
# protected-mode guards against accidental host port binding changes.
protected-mode yes

# Data directory -- explicit so AOF files always land in the named volume.
dir /data

# Persistence: AOF only, no RDB snapshots.
appendonly yes
appendfsync everysec
# Disables fsync during AOF rewrite to avoid latency spikes; trade-off is up to
# ~30s of writes in the OS buffer if the process crashes during a rewrite.
no-appendfsync-on-rewrite yes
save ""
rdbchecksum no
rdbcompression no

# Memory: evict only keys with a TTL so auth/session tokens are never silently
# dropped; allkeys-lru would risk evicting blacklisted refresh tokens.
maxmemory 256mb
maxmemory-policy volatile-lru
maxmemory-samples 10

# Logging
loglevel notice
